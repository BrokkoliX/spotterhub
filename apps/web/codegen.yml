schema:
  - http://localhost:4000/graphql:
      headers:
        Sec-Fetch-Site: same-origin
documents: src/lib/queries.ts
generates:
  src/lib/generated/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-urql
    config:
      urqlImportFrom: urql
      skipTypename: false
      silent: true
      overwrite: true
