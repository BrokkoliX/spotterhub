name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint → Typecheck → Test → Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # PostGIS image matches docker-compose and production — several Prisma
      # migrations CREATE EXTENSION postgis, so a plain postgres image would
      # fail `prisma migrate deploy`.
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: spotterspace
          POSTGRES_PASSWORD: spotterspace_dev
          POSTGRES_DB: spotterspace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spotterspace"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      # Migrations run against the main CI database.
      DATABASE_URL: postgresql://spotterspace:spotterspace_dev@localhost:5432/spotterspace
      # Tests run against an isolated database so `prisma db push` in vitest
      # never clobbers the migrated schema. Created in the "Create test DB" step.
      TEST_DATABASE_URL: postgresql://spotterspace:spotterspace_dev@localhost:5432/spotterspace_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx turbo run generate --filter=@spotterspace/db

      - name: Create test database
        # GitHub Actions `services:` blocks can't run init SQL, so create the
        # test DB explicitly. IF NOT EXISTS makes the step idempotent for reruns.
        env:
          PGPASSWORD: spotterspace_dev
        run: |
          psql -h localhost -p 5432 -U spotterspace -d spotterspace 
            -tc "SELECT 1 FROM pg_database WHERE datname = 'spotterspace_test'" 
            | grep -q 1 
            || psql -h localhost -p 5432 -U spotterspace -d spotterspace 
                 -c "CREATE DATABASE spotterspace_test OWNER spotterspace"

      - name: Run Prisma migrations
        run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma

      - name: Lint
        run: npx turbo run lint

      - name: Type check
        run: npx turbo run typecheck

      - name: Test
        run: npx turbo run test

      - name: Build
        run: npx turbo run build
