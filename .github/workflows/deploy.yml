name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "infrastructure/**"
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: "dev"
        type: choice
        choices: ["dev", "prod"]

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

jobs:
  # ─── Deploy Infrastructure ─────────────────────────────────────────────────
  deploy-infra:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CDK
        run: |
          npm install -g aws-cdk
          cd infrastructure && npm install

      - name: Build infrastructure
        run: cd infrastructure && npm run build

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap CDK
        run: |
          cd infrastructure
          cdk bootstrap aws://${{ vars.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }} \
            --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess \
            2>/dev/null || true

      - name: Deploy CDK Stack
        id: cdk-deploy
        run: |
          cd infrastructure
          STAGE="${{ inputs.stage || 'dev' }}" \
          JWT_SECRET_INITIAL_VALUE="${{ secrets.JWT_SECRET_INITIAL_VALUE }}" \
          S3_BUCKET_NAME="${{ vars.S3_BUCKET_NAME || 'spotterhub-photos' }}" \
          cdk deploy SpotterHub-${{ inputs.stage || 'dev' }}-Stack \
            --require-approval never \
            --outputs-file cdks-outputs.json
        env:
          STAGE: ${{ inputs.stage || 'dev' }}

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdks-outputs
          path: infrastructure/cdks-outputs.json
          retention-days: 1

  # ─── Build & Push API Image ───────────────────────────────────────────────
  build-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ github.workspace }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract ECR repo URI
        id: ecr-api
        run: |
          repo_uri=$(aws cloudformation describe-stacks \
            --stack-name "SpotterHub-${{ inputs.stage || 'dev' }}-Stack" \
            --query 'Stacks[0].Outputs[?OutputKey==`ECRApiRepoUri`].OutputValue' \
            --output text)
          echo "repo-uri=$repo_uri" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}
          file: ${{ github.workspace }}/apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-api.outputs.repo-uri }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Build & Push Web Image ───────────────────────────────────────────────
  build-web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ github.workspace }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract ECR repo URI and CDK outputs
        id: ecr-web
        run: |
          repo_uri=$(aws cloudformation describe-stacks \
            --stack-name "SpotterHub-${{ inputs.stage || 'dev' }}-Stack" \
            --query 'Stacks[0].Outputs[?OutputKey==`ECRWebRepoUri`].OutputValue' \
            --output text)
          echo "repo-uri=$repo_uri" >> $GITHUB_OUTPUT

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}
          file: ${{ github.workspace }}/apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-web.outputs.repo-uri }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Deploy App Runner Services ───────────────────────────────────────────
  deploy-apprunner:
    name: Deploy App Runner Services
    runs-on: ubuntu-latest
    needs: [deploy-infra, build-api, build-web]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Extract CDK outputs
        id: cdk
        run: |
          stack_name="SpotterHub-${{ inputs.stage || 'dev' }}-Stack"
          echo "api-repo=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`ECRApiRepoUri`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "web-repo=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`ECRWebRepoUri`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "exec-role=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`AppRunnerExecutionRoleArn`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "ecr-role=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`AppRunnerECRAccessRoleArn`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "db-secret=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`DBUrlSecretArn`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "jwt-secret=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`JWTSecretArn`].OutputValue' --output text)" >> $GITHUB_OUTPUT
          echo "stage=${{ inputs.stage || 'dev' }}" >> $GITHUB_OUTPUT

      - name: Create App Runner API Service
        id: api-service
        run: |
          api_service=$(aws apprunner create-service \
            --service-name "spotterhub-${{ steps.cdk.outputs.stage }}-api" \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "'${{ steps.cdk.outputs.api-repo }}':latest",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": {
                  "Port": "4000",
                  "RuntimeEnvironmentVariables": [
                    {"Name": "NODE_ENV", "Value": "production"},
                    {"Name": "API_PORT", "Value": "4000"},
                    {"Name": "STAGE", "Value": "'${{ steps.cdk.outputs.stage }}'"}
                  ]
                }
              },
              "AutoDeploymentsEnabled": true,
              "AuthenticationConfiguration": {
                "AccessRoleArn": "'${{ steps.cdk.outputs.ecr-role }}'"
              }
            }' \
            --instance-configuration '{
              "Cpu": "1024",
              "Memory": "2048",
              "InstanceRoleArn": "'${{ steps.cdk.outputs.exec-role }}'"
            }' \
            --health-check-configuration '{
              "Protocol": "HTTP",
              "Path": "/health",
              "Interval": 20,
              "Timeout": 5,
              "HealthyThreshold": 2,
              "UnhealthyThreshold": 3
            }' \
            --query 'Service.{arn:ServiceArn,url:ServiceUrl}' \
            --output json)
          echo "api-url=$(echo $api_service | jq -r '.url')" >> $GITHUB_OUTPUT
          echo "api-arn=$(echo $api_service | jq -r '.arn')" >> $GITHUB_OUTPUT
          echo "api_service=$api_service" >> $GITHUB_OUTPUT

      - name: Wait for API service to stabilize
        run: |
          echo "Waiting for API service to stabilize..."
          aws apprunner wait service-stable \
            --service-arn "${{ steps.api-service.outputs.api-arn }}"
          echo "API service stabilized"

      - name: Create App Runner Web Service
        id: web-service
        run: |
          aws apprunner create-service \
            --service-name "spotterhub-${{ steps.cdk.outputs.stage }}-web" \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "'${{ steps.cdk.outputs.web-repo }}':latest",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": {
                  "Port": "3000",
                  "RuntimeEnvironmentVariables": [
                    {"Name": "NODE_ENV", "Value": "production"},
                    {"Name": "PORT", "Value": "3000"},
                    {"Name": "NEXT_PUBLIC_API_URL", "Value": "${{ steps.api-service.outputs.api-url }}"},
                    {"Name": "NEXT_PUBLIC_MAPBOX_TOKEN", "Value": "${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}"}
                  ]
                }
              },
              "AutoDeploymentsEnabled": true,
              "AuthenticationConfiguration": {
                "AccessRoleArn": "'${{ steps.cdk.outputs.ecr-role }}'"
              }
            }' \
            --instance-configuration '{
              "Cpu": "1024",
              "Memory": "2048",
              "InstanceRoleArn": "'${{ steps.cdk.outputs.exec-role }}'"
            }' \
            --health-check-configuration '{
              "Protocol": "HTTP",
              "Path": "/",
              "Interval": 20,
              "Timeout": 5,
              "HealthyThreshold": 2,
              "UnhealthyThreshold": 3
            }' \
            --query 'Service.{arn:ServiceArn,url:ServiceUrl}' \
            --output json | jq -r '{arn:.arn,url:.url}'

      - name: Print deployment URLs
        run: |
          echo "✅ API Service: ${{ steps.api-service.outputs.api-url }}"
          echo "✅ Web Service: ${{ steps.web-service.outputs.url }}"
