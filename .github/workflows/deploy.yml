name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "infrastructure/**"
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: "dev"
        type: choice
        choices: ["dev", "prod"]

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

jobs:
  # ─── Deploy Infrastructure (CDK — Lambda + RDS + VPC) ──────────────────────
  deploy-infra:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CDK
        run: |
          npm install -g aws-cdk
          cd infrastructure && npm install

      - name: Build infrastructure
        run: cd infrastructure && npm run build

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap CDK
        run: |
          cd infrastructure
          cdk bootstrap aws://${{ vars.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }} \
            --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess \
            2>/dev/null || true

      - name: Deploy CDK Stack
        id: cdk-deploy
        run: |
          cd infrastructure
          STAGE="${{ inputs.stage || 'dev' }}" \
          JWT_SECRET_INITIAL_VALUE="${{ secrets.JWT_SECRET_INITIAL_VALUE }}" \
          S3_BUCKET_NAME="${{ vars.S3_BUCKET_NAME || 'spotterspace-photos' }}" \
          cdk deploy SpotterSpace-${{ inputs.stage || 'dev' }}-Stack \
            --require-approval never \
            --outputs-file cdks-outputs.json

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdks-outputs
          path: infrastructure/cdks-outputs.json
          retention-days: 1

      - name: Extract deployment outputs
        id: outputs
        run: |
          stack_name="SpotterSpace-${{ inputs.stage || 'dev' }}-Stack"
          api_url=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`ApiFunctionUrl`].OutputValue' --output text)
          amplify_role=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`AmplifyServiceRoleArn`].OutputValue' --output text)
          echo "api-url=$api_url" >> $GITHUB_OUTPUT
          echo "amplify-role=$amplify_role" >> $GITHUB_OUTPUT
          echo "stage=${{ inputs.stage || 'dev' }}" >> $GITHUB_OUTPUT

      - name: Print CDK deployment info
        run: |
          echo "✅ CDK Stack deployed"
          echo "   API URL: ${{ steps.outputs.outputs.api-url }}"
          echo "   Amplify Role: ${{ steps.outputs.outputs.amplify-role }}"

  # ─── Deploy Web App (Amplify) ─────────────────────────────────────────────
  deploy-web:
    name: Deploy Web App (Amplify)
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for Amplify to analyze commits

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Extract CDK outputs
        id: cdk
        run: |
          stack_name="SpotterSpace-${{ inputs.stage || 'dev' }}-Stack"
          api_url=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`ApiFunctionUrl`].OutputValue' --output text)
          amplify_role=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`AmplifyServiceRoleArn`].OutputValue' --output text)
          echo "api-url=$api_url" >> $GITHUB_OUTPUT
          echo "amplify-role=$amplify_role" >> $GITHUB_OUTPUT
          echo "stage=${{ inputs.stage || 'dev' }}" >> $GITHUB_OUTPUT

      - name: Create or update Amplify app
        id: amplify-app
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          AMPLIFY_ROLE: ${{ steps.cdk.outputs.amplify-role }}
          API_URL: ${{ steps.cdk.outputs.api-url }}
          MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          STAGE: ${{ steps.cdk.outputs.stage }}
        run: |
          set -e

          APP_NAME="spotterspace-$STAGE-web"

          # Build spec for monorepo Next.js app at apps/web
          BUILD_SPEC=$(cat <<'EOF'
version: 1
application:
  frontend:
    phases:
      preBuild:
        commands:
          - npm ci
          - npx turbo run build --filter=@spotterhub/web
      build:
        commands:
          - cp -r apps/web/.next/static apps/web/.next/standalone/ 2>/dev/null || true
    artifacts:
      baseDirectory: apps/web/.next/standalone
      files:
        - '**/*'
    cache:
      paths:
        - node_modules/**/*
        - .npm/**/*
        - .next/cache/**/*
EOF
          )

          # Check if app already exists
          APP_ID=$(aws amplify list-apps --query "apps[?name=='$APP_NAME'].appId" --output text 2>/dev/null | tr -d '\n')

          if [ -n "$APP_ID" ]; then
            echo "Updating existing Amplify app: $APP_ID"
            aws amplify update-app \
              --app-id "$APP_ID" \
              --build-spec "$BUILD_SPEC" \
              --environment-variables "KeyName=NEXT_PUBLIC_API_URL,Value=$API_URL" \
              --environment-variables "KeyName=NEXT_PUBLIC_MAPBOX_TOKEN,Value=$MAPBOX_TOKEN" \
              --iam-service-role-arn "$AMPLIFY_ROLE" \
              --enable-branch-auto-build \
              --enable-basic-auth false \
              --stage "PRODUCTION" \
              --framework "Next.js"
          else
            echo "Creating new Amplify app: $APP_NAME"
            aws amplify create-app \
              --name "$APP_NAME" \
              --repository "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
              --branch-name "main" \
              --build-spec "$BUILD_SPEC" \
              --environment-variables "KeyName=NEXT_PUBLIC_API_URL,Value=$API_URL" \
              --environment-variables "KeyName=NEXT_PUBLIC_MAPBOX_TOKEN,Value=$MAPBOX_TOKEN" \
              --iam-service-role-arn "$AMPLIFY_ROLE" \
              --oauth-token "$GH_TOKEN" \
              --enable-branch-auto-build \
              --enable-basic-auth false \
              --stage "PRODUCTION" \
              --framework "Next.js" \
              --platform WEB \
              --output json | tee /tmp/amplify-create.json
            APP_ID=$(cat /tmp/amplify-create.json | jq -r '.app.appId')
          fi

          echo "app-id=$APP_ID" >> $GITHUB_OUTPUT
          echo "✅ Amplify app ready: $APP_ID"

      - name: Trigger Amplify deployment
        env:
          APP_ID: ${{ steps.amplify-app.outputs.app-id }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Amplify app ID: $APP_ID"
          echo "✅ Amplify will auto-deploy from GitHub main branch"
          echo "   Visit https://us-east-1.console.aws.amazon.com/amplify/apps/$APP_ID"
