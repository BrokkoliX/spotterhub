name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "infrastructure/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "24"
  ECS_CLUSTER: spotterspace-cluster
  API_ECR_REPO: spotterspace-dev-api
  WEB_ECR_REPO: spotterspace-dev-web
  API_SERVICE: spotterspace-dev-api
  WEB_SERVICE: spotterspace-dev-web

# Migrations run as a one-off ECS task in the deploy-api job (see the
# "Apply database migrations" step) BEFORE the rolling deploy of the API
# service. The container entrypoint only runs migrations when
# RUN_MIGRATIONS=true, so normal task replacements start fast and a bad
# migration cannot crash-loop production tasks.

jobs:
  # ─── Build and Deploy API to ECS Fargate ───────────────────────────────────
  deploy-api:
    name: Deploy API (ECS Fargate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.API_ECR_REPO }}:latest
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.API_ECR_REPO }}:${{ github.sha }}
          cache-from: type=gha,scope=api-builder
          cache-to: type=gha,mode=max,scope=api-builder
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Apply database migrations (one-off task)
        env:
          FULL_IMAGE: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.API_ECR_REPO }}:${{ github.sha }}
        run: |
          set -euo pipefail

          # Migrations now run as a one-off ECS task BEFORE the rolling deploy
          # of the API service. The container entrypoint only runs migrations
          # when RUN_MIGRATIONS=true, so normal task replacements start fast.
          # See apps/api/docker-entrypoint.sh.

          # 1. Build a fresh task definition revision pinned to the new image
          #    with RUN_MIGRATIONS=true and a no-op command (so the entrypoint
          #    runs migrations then exec's `true` and exits 0).
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition spotterspace-dev-api \
            --region ${{ env.AWS_REGION }})

          CONTAINER_NAME=$(echo "$TASK_DEF" | jq -r '.taskDefinition.containerDefinitions[0].name')

          MIGRATION_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMG "$FULL_IMAGE" \
            --arg CNAME "$CONTAINER_NAME" \
            '.taskDefinition
             | .containerDefinitions[0].name = $CNAME
             | .containerDefinitions[0].image = $IMG
             | .family = "spotterspace-dev-api-migrate"
             | { family, containerDefinitions, cpu, memory, networkMode,
                 requiresCompatibilities, executionRoleArn, taskRoleArn,
                 volumes, placementConstraints }')

          MIGRATION_ARN=$(echo "$MIGRATION_TASK_DEF" \
            | aws ecs register-task-definition \
                --cli-input-json "$(cat)" \
                --region ${{ env.AWS_REGION }} \
            | jq -r '.taskDefinition.taskDefinitionArn')

          # 2. Discover the network config the live API service uses so the
          #    one-off task lands in the same subnets / security groups
          #    (necessary for RDS reachability). Avoids hard-coding IDs here.
          SVC_NETWORK=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.API_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            | jq -c '.services[0].networkConfiguration')

          # 3. Run the task with RUN_MIGRATIONS=true and a no-op command. The
          #    entrypoint runs `prisma migrate deploy`, then exec's `true` so
          #    the container exits 0.
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition "$MIGRATION_ARN" \
            --launch-type FARGATE \
            --network-configuration "$SVC_NETWORK" \
            --overrides "$(jq -n --arg CNAME "$CONTAINER_NAME" '{
              containerOverrides: [{
                name: $CNAME,
                command: ["true"],
                environment: [{ name: "RUN_MIGRATIONS", value: "true" }]
              }]
            }')" \
            --region ${{ env.AWS_REGION }} \
            | jq -r '.tasks[0].taskArn')

          echo "Migration task started: $TASK_ARN"

          # 4. Wait for the task to stop, then check its exit code.
          aws ecs wait tasks-stopped \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }}

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }} \
            | jq -r '.tasks[0].containers[0].exitCode // empty')

          if [ "$EXIT_CODE" != "0" ]; then
            REASON=$(aws ecs describe-tasks \
              --cluster ${{ env.ECS_CLUSTER }} \
              --tasks "$TASK_ARN" \
              --region ${{ env.AWS_REGION }} \
              | jq -r '.tasks[0].stoppedReason // .tasks[0].containers[0].reason // "unknown"')
            echo "::error::Migration task failed (exit=$EXIT_CODE): $REASON"
            exit 1
          fi
          echo "✅ Migrations applied successfully"

      - name: Update API task definition and deploy
        env:
          FULL_IMAGE: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.API_ECR_REPO }}:${{ github.sha }}
        run: |
          # Get the latest API task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition spotterspace-dev-api --region ${{ env.AWS_REGION }})

          # Extract the actual container name from the latest revision (guards against stale task defs)
          CONTAINER_NAME=$(echo "$TASK_DEF" | jq -r '.taskDefinition.containerDefinitions[0].name')

          # Register new revision with only the fields register-task-definition accepts
          NEW_ARN=$(echo "$TASK_DEF" | jq --arg IMG "$FULL_IMAGE" --arg CNAME "$CONTAINER_NAME" \
            '.taskDefinition | .containerDefinitions[0].name = $CNAME | .containerDefinitions[0].image = $IMG
             | { family, containerDefinitions, cpu, memory, networkMode, requiresCompatibilities,
                 executionRoleArn, taskRoleArn, volumes, placementConstraints }' \
            | aws ecs register-task-definition --cli-input-json "$(cat)" --region ${{ env.AWS_REGION }} \
            | jq -r '.taskDefinition.taskDefinitionArn')

          # Update service with new task definition
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.API_SERVICE }} \
            --task-definition "$NEW_ARN" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} > /dev/null
          echo "✅ API deployed with image: $FULL_IMAGE"

  # ─── Build and Deploy Web to ECS Fargate ───────────────────────────────────
  deploy-web:
    name: Deploy Web (ECS Fargate)
    needs: deploy-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.WEB_ECR_REPO }}:latest
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.WEB_ECR_REPO }}:${{ github.sha }}
          cache-from: type=gha,scope=web-builder
          cache-to: type=gha,mode=max,scope=web-builder
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            NEXT_PUBLIC_API_URL=https://api.${{ vars.DOMAIN_NAME || 'spotterspace.com' }}/graphql
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
            NEXT_PUBLIC_S3_IMAGES_HOST=${{ vars.S3_IMAGES_HOST || 'https://d2ur47prd8ljwz.cloudfront.net' }}
            NEXT_PUBLIC_S3_BUCKET=${{ vars.S3_BUCKET_NAME || 'spotterspace-photos' }}

      - name: Update Web task definition and deploy
        env:
          FULL_IMAGE: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.WEB_ECR_REPO }}:${{ github.sha }}
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition spotterspace-dev-web --region ${{ env.AWS_REGION }})

          # Update image in container definition and register new revision
          # Use del to remove null fields that would cause validation errors
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMG "$FULL_IMAGE" \
            '.taskDefinition | .containerDefinitions[0].image = $IMG | {family, containerDefinitions, cpu, memory, networkMode, requiresCompatibilities, executionRoleArn, taskRoleArn} | del(.[] | nulls)')

          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --region ${{ env.AWS_REGION }} \
            | jq -r '.taskDefinition.taskDefinitionArn')

          # Update service with new task definition
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.WEB_SERVICE }} \
            --task-definition "$NEW_ARN" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} > /dev/null
          echo "✅ Web deployed with image: $FULL_IMAGE"
