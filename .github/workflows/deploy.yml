name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "infrastructure/**"
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

jobs:
  # ─── Deploy Infrastructure (CDK — App Runner + VPC Connector + DNS) ────────
  deploy-infra:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    outputs:
      api-ecr: ${{ steps.outputs.outputs.api-ecr }}
      web-ecr: ${{ steps.outputs.outputs.web-ecr }}
      api-service-arn: ${{ steps.outputs.outputs.api-service-arn }}
      web-service-arn: ${{ steps.outputs.outputs.web-service-arn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install CDK
        run: |
          npm install -g aws-cdk
          cd infrastructure && npm install

      - name: Build infrastructure
        run: cd infrastructure && npm run build

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap CDK
        run: |
          cd infrastructure
          cdk bootstrap aws://${{ vars.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }} 
            --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess 
            2>/dev/null || true

      - name: Deploy CDK Stack
        id: cdk-deploy
        run: |
          cd infrastructure
          STAGE="${{ inputs.stage || 'dev' }}" 
          S3_BUCKET_NAME="${{ vars.S3_BUCKET_NAME || 'spotterspace-photos' }}" 
          VPC_ID="${{ vars.VPC_ID }}" 
          DOMAIN_NAME="${{ vars.DOMAIN_NAME || '' }}" 
          HOSTED_ZONE_ID="${{ vars.HOSTED_ZONE_ID || '' }}" 
          CDK_DEFAULT_ACCOUNT="${{ vars.AWS_ACCOUNT_ID }}" 
          CDK_DEFAULT_REGION="${{ env.AWS_REGION }}" 
          cdk deploy SpotterSpace-${{ inputs.stage || 'dev' }}-Stack 
            --require-approval never 
            --outputs-file cdks-outputs.json

      - name: Extract deployment outputs
        id: outputs
        run: |
          stack_name="SpotterSpace-${{ inputs.stage || 'dev' }}-Stack"
          api_ecr=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`ApiEcrRepositoryUri`].OutputValue' --output text)
          web_ecr=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`WebEcrRepositoryUri`].OutputValue' --output text)
          api_service_arn=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`ApiServiceArn`].OutputValue' --output text)
          web_service_arn=$(aws cloudformation describe-stacks --stack-name $stack_name --query 'Stacks[0].Outputs[?OutputKey==`WebServiceArn`].OutputValue' --output text)
          echo "api-ecr=$api_ecr" >> $GITHUB_OUTPUT
          echo "web-ecr=$web_ecr" >> $GITHUB_OUTPUT
          echo "api-service-arn=$api_service_arn" >> $GITHUB_OUTPUT
          echo "web-service-arn=$web_service_arn" >> $GITHUB_OUTPUT

      - name: Print CDK deployment info
        run: |
          echo "✅ CDK Stack deployed"
          echo "   API ECR: ${{ steps.outputs.outputs.api-ecr }}"
          echo "   Web ECR: ${{ steps.outputs.outputs.web-ecr }}"

  # ─── Build and Push API Docker Image ───────────────────────────────────────
  deploy-api:
    name: Deploy API (App Runner)
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ needs.deploy-infra.outputs.api-ecr }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Trigger App Runner deployment
        run: |
          aws apprunner start-deployment 
            --service-arn "${{ needs.deploy-infra.outputs.api-service-arn }}"
          echo "✅ API App Runner deployment triggered"

  # ─── Build and Push Web Docker Image ───────────────────────────────────────
  deploy-web:
    name: Deploy Web App (App Runner)
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ needs.deploy-infra.outputs.web-ecr }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.${{ vars.DOMAIN_NAME || 'spotterspace.com' }}/graphql
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}

      - name: Trigger App Runner deployment
        run: |
          aws apprunner start-deployment 
            --service-arn "${{ needs.deploy-infra.outputs.web-service-arn }}"
          echo "✅ Web App Runner deployment triggered"
