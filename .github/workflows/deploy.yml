name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "infrastructure/**"
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: "dev"
        type: choice
        choices: ["dev", "prod"]

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

jobs:
  # ─── Deploy Infrastructure ─────────────────────────────────────────────────
  deploy-infra:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CDK
        run: |
          npm install -g aws-cdk
          cd infrastructure && npm install

      - name: Build infrastructure
        run: cd infrastructure && npm run build

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap CDK
        run: |
          cd infrastructure
          cdk bootstrap aws://${{ vars.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }} \
            --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess \
            2>/dev/null || true

      - name: Deploy CDK Stack
        id: cdk-deploy
        run: |
          cd infrastructure
          STAGE="${{ inputs.stage || 'dev' }}" \
          JWT_SECRET_INITIAL_VALUE="${{ secrets.JWT_SECRET_INITIAL_VALUE }}" \
          S3_BUCKET_NAME="${{ vars.S3_BUCKET_NAME || 'spotterhub-photos' }}" \
          NEXT_PUBLIC_MAPBOX_TOKEN="${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}" \
          cdk deploy SpotterHub-${{ inputs.stage || 'dev' }}-Stack \
            --require-approval never \
            --outputs-file cdks-outputs.json
        env:
          STAGE: ${{ inputs.stage || 'dev' }}

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdks-outputs
          path: infrastructure/cdks-outputs.json
          retention-days: 1

  # ─── Build & Push API Image ───────────────────────────────────────────────
  build-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract ECR repo URI
        id: ecr-api
        run: |
          repo_uri=$(aws cloudformation describe-stacks \
            --stack-name "SpotterHub-${{ inputs.stage || 'dev' }}-Stack" \
            --query 'Stacks[0].Outputs[?OutputKey==`ECRApiRepoUri`].OutputValue' \
            --output text)
          echo "repo-uri=$repo_uri" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          dockerfile: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-api.outputs.repo-uri }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Build & Push Web Image ───────────────────────────────────────────────
  build-web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract ECR repo URI
        id: ecr-web
        run: |
          repo_uri=$(aws cloudformation describe-stacks \
            --stack-name "SpotterHub-${{ inputs.stage || 'dev' }}-Stack" \
            --query 'Stacks[0].Outputs[?OutputKey==`ECRWebRepoUri`].OutputValue' \
            --output text)
          echo "repo-uri=$repo_uri" >> $GITHUB_OUTPUT

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          dockerfile: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-web.outputs.repo-uri }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Trigger App Runner Redeploy ──────────────────────────────────────────
  redeploy:
    name: Trigger App Runner Redeploy
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: ${{ inputs.stage != 'prod' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger API redeploy
        run: |
          api_arn=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='spotterhub-${{ inputs.stage || 'dev' }}-api'].ServiceArn" \
            --output text)
          if [ -n "$api_arn" ]; then
            aws apprunner start-deployment --service-arn "$api_arn"
          fi

      - name: Trigger Web redeploy
        run: |
          web_arn=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='spotterhub-${{ inputs.stage || 'dev' }}-web'].ServiceArn" \
            --output text)
          if [ -n "$web_arn" ]; then
            aws apprunner start-deployment --service-arn "$web_arn"
          fi
