name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "infrastructure/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "24"
  ECS_CLUSTER: spotterspace-cluster
  API_ECR_REPO: spotterspace-dev-api
  WEB_ECR_REPO: spotterspace-dev-web
  API_SERVICE: spotterspace-dev-api
  WEB_SERVICE: spotterspace-dev-web

# Migrations run inside the API container entrypoint (docker-entrypoint.sh)
# before the server starts, since the ECS tasks have VPC access to RDS.

jobs:
  # ─── Build and Deploy API to ECS Fargate ───────────────────────────────────
  deploy-api:
    name: Deploy API (ECS Fargate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.API_ECR_REPO }}:latest
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.API_ECR_REPO }}:${{ github.sha }}
          cache-from: type=gha,scope=api-builder
          cache-to: type=gha,mode=max,scope=api-builder
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Update API task definition and deploy
        env:
          FULL_IMAGE: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.API_ECR_REPO }}:${{ github.sha }}
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition spotterspace-dev-api --region ${{ env.AWS_REGION }})

          # Update image in container definition and register new revision
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMG "$FULL_IMAGE" \
            '.taskDefinition | .containerDefinitions[0].image = $IMG | {family, containerDefinitions, cpu, memory, networkMode, requiresCompatibilities, executionRoleArn, taskRoleArn}')

          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --region ${{ env.AWS_REGION }} \
            | jq -r '.taskDefinition.taskDefinitionArn')

          # Update service with new task definition
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.API_SERVICE }} \
            --task-definition "$NEW_ARN" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} > /dev/null
          echo "✅ API deployed with image: $FULL_IMAGE"

  # ─── Build and Deploy Web to ECS Fargate ───────────────────────────────────
  deploy-web:
    name: Deploy Web (ECS Fargate)
    needs: deploy-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.WEB_ECR_REPO }}:latest
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.WEB_ECR_REPO }}:${{ github.sha }}
          cache-from: type=gha,scope=web-builder
          cache-to: type=gha,mode=max,scope=web-builder
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            NEXT_PUBLIC_API_URL=https://api.${{ vars.DOMAIN_NAME || 'spotterspace.com' }}/graphql
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
            NEXT_PUBLIC_S3_IMAGES_HOST=${{ vars.S3_IMAGES_HOST || 'https://d2ur47prd8ljwz.cloudfront.net' }}
            NEXT_PUBLIC_S3_BUCKET=${{ vars.S3_BUCKET_NAME || 'spotterspace-photos' }}

      - name: Update Web task definition and deploy
        env:
          FULL_IMAGE: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.WEB_ECR_REPO }}:${{ github.sha }}
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition spotterspace-dev-web --region ${{ env.AWS_REGION }})

          # Update image in container definition and register new revision
          # Use del to remove null fields that would cause validation errors
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMG "$FULL_IMAGE" \
            '.taskDefinition | .containerDefinitions[0].image = $IMG | {family, containerDefinitions, cpu, memory, networkMode, requiresCompatibilities, executionRoleArn, taskRoleArn} | del(.[] | nulls)')

          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --region ${{ env.AWS_REGION }} \
            | jq -r '.taskDefinition.taskDefinitionArn')

          # Update service with new task definition
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.WEB_SERVICE }} \
            --task-definition "$NEW_ARN" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} > /dev/null
          echo "✅ Web deployed with image: $FULL_IMAGE"
